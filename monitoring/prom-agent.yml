apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: prometheus-agent
  namespace: argocd
spec:
  project: default
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
  source:
    repoURL: https://prometheus-community.github.io/helm-charts
    chart: prometheus
    targetRevision: 25.27.0
    helm:
      values: |
        # 1. COMPLETELY DISABLE THE SERVER
        server:
          enabled: false

        # 2. ENABLE THE AGENT
        agent:
          enabled: true
          nameOverride: "agent" # This will change the pod name to prometheus-agent-agent
          
          # This is the standard way to configure remote write in this chart
          configmapReload:
            enabled: true
          
          remoteWrite:
            - url: "http://192.168.6.15:8428/api/v1/write"
          
          externalLabels:
            cluster: 'my-k3s-cluster'

          # Force Agent mode flags
          extraArgs:
            enable-feature: agent

        # 3. KEEP THE EXPORTERS
        prometheus-node-exporter:
          enabled: true
        kube-state-metrics:
          enabled: true

        # 4. DISABLE THE REST
        alertmanager:
          enabled: false
        pushgateway:
          enabled: false