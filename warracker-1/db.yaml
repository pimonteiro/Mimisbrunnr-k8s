apiVersion: apps/v1
kind: Deployment
metadata:
  name: warracker-1-db
  namespace: warracker-1
spec:
  replicas: 1
  selector:
    matchLabels:
      app: warracker-1-db
  template:
    metadata:
      labels:
        app: warracker-1-db
    spec:
      containers:
        - name: postgres
          image: postgres:15-alpine
          ports:
            - containerPort: 5432
          resources:
            limits:
              memory: 512Mi
              cpu: "400m"
            requests:
              memory: 256Mi
              cpu: "200m"
          env:
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          envFrom:
            - secretRef:
                name: warracker-1-env
          volumeMounts:
            - name: db-data
              mountPath: /var/lib/postgresql/data
          # Healthchecks based on your docker-compose
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "warranty_user", "-d", "warranty_db"]
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "warranty_user", "-d", "warranty_db"]
            initialDelaySeconds: 10
            periodSeconds: 10
      volumes:
        - name: db-data
          persistentVolumeClaim:
            claimName: warracker-1-db-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: warracker-1-db
  namespace: warracker-1
spec:
  selector:
    app: warracker-1-db
  ports:
    - port: 5432
      targetPort: 5432