apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: data-mig-pvc
  namespace: karakeep-1
spec:
  storageClassName: truenas-nfs
  accessModes:
    - ReadWriteOnce # Match what your old Longhorn PVC had (or ReadWriteMany)
  resources:
    requests:
      storage: 1Gi 
