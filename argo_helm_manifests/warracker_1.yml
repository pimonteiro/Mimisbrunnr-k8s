apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: warracker-1
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/pimonteiro/Mimisbrunnr-k8s.git
    path: warracker-1
    targetRevision: HEAD
  destination:
    server: https://kubernetes.default.svc
    namespace: warracker-1
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true