apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: prometheus-agent
  namespace: argocd
spec:
  project: default
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
  source:
    repoURL: https://prometheus-community.github.io/helm-charts
    chart: prometheus
    targetRevision: 25.11.0
    helm:
      values: |
        # Disable components not needed for Agent mode
        alertmanager:
          enabled: false
        pushgateway:
          enabled: false
        nodeExporter:
          enabled: true  # Keep enabled to get node metrics
        kubeStateMetrics:
          enabled: true  # Keep enabled to get pod/deployment metrics

        server:
          # Enable the Agent feature flag
          defaultFlagsOverride:
            - --config.file=/etc/config/prometheus.yml
            - --storage.agent.path=/data
            - --web.enable-lifecycle
            - --enable-feature=agent

          # Configure Remote Write to VictoriaMetrics
          remoteWrite:
            - url: "http://192.168.6.15:8428/api/v1/write"
              # Optional: Add queue config if you have high load
              # queue_config:
              #   max_samples_per_send: 1000
              #   capacity: 2500

          global:
            external_labels:
              cluster: my-k3s-cluster
              environment: prod

          # Agent mode uses a WAL (Write Ahead Log) but no TSDB. 
          # You can disable the large Persistent Volume, or keep a small one for buffering during network outages.
          persistentVolume:
            enabled: false

          # Disable the retention flag which is incompatible with Agent mode (depending on chart version)
          # agent mode handles WAL retention differently, but the chart might inject retention flags.
          # If the pod fails with flag errors, override the retention args or leave defaults if they don't conflict.

        # CRITICAL: Agent mode does not support rule files (alerting/recording rules).
        # You must clear this list or the pod will crash with "field rule_files is not allowed in agent mode"
        serverFiles:
          prometheus.yml:
            rule_files: null

            scrape_configs:
              # 1. Scrape the Agent itself (Health check)
              - job_name: 'prometheus-agent'
                static_configs:
                  - targets: ['localhost:9090']

              # 2. Kubelet & cAdvisor (Container Resources - CPU/MEM)
              # REQUIRED for: "Kubernetes / Compute Resources / Pod" dashboards
              - job_name: 'kubernetes-nodes-cadvisor'
                scheme: https
                tls_config:
                  ca_file: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
                  insecure_skip_verify: true
                bearer_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token
                kubernetes_sd_configs:
                  - role: node
                relabel_configs:
                  - action: labelmap
                    regex: __meta_kubernetes_node_label_(.+)
                  # This magic replacement targets the cAdvisor endpoint on the Kubelet
                  - target_label: __metrics_path__
                    replacement: /metrics/cadvisor

              # 3. Service Endpoints (Finds Node Exporter & Kube State Metrics)
              # REQUIRED for: "Node Exporter Full" and "Cluster Health" dashboards
              # This job automatically finds any service with annotation "prometheus.io/scrape: true"
              - job_name: 'kubernetes-service-endpoints'
                kubernetes_sd_configs:
                  - role: endpoints
                relabel_configs:
                  - source_labels: [__meta_kubernetes_service_annotation_prometheus_io_scrape]
                    action: keep
                    regex: true
                  - source_labels: [__meta_kubernetes_service_annotation_prometheus_io_scheme]
                    action: replace
                    target_label: __scheme__
                    regex: (https?)
                  - source_labels: [__meta_kubernetes_service_annotation_prometheus_io_path]
                    action: replace
                    target_label: __metrics_path__
                    regex: (.+)
                  - source_labels: [__address__, __meta_kubernetes_service_annotation_prometheus_io_port]
                    action: replace
                    target_label: __address__
                    regex: ([^:]+)(?::\d+)?;(\d+)
                    replacement: $1:$2
                  - action: labelmap
                    regex: __meta_kubernetes_service_label_(.+)
                  # Maps the service name (e.g., 'node-exporter') to the 'job' label
                  - source_labels: [__meta_kubernetes_service_name]
                    target_label: job

              # 4. Pod Scraping (Your Applications)
              # Scrapes any pod you annotate with prometheus.io/scrape: "true"
              - job_name: 'kubernetes-pods'
                kubernetes_sd_configs:
                  - role: pod
                relabel_configs:
                  - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
                    action: keep
                    regex: true
                  - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
                    action: replace
                    target_label: __metrics_path__
                    regex: (.+)
                  - source_labels: [__address__, __meta_kubernetes_pod_annotation_prometheus_io_port]
                    action: replace
                    target_label: __address__
                    regex: ([^:]+)(?::\d+)?;(\d+)
                    replacement: $1:$2
                  - action: labelmap
                    regex: __meta_kubernetes_pod_label_(.+)
                  - source_labels: [__meta_kubernetes_namespace]
                    action: replace
                    target_label: kubernetes_namespace
                  - source_labels: [__meta_kubernetes_pod_name]
                    action: replace
                    target_label: kubernetes_pod_name