apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: suwayomi-server-1
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/pimonteiro/Mimisbrunnr-k8s.git
    path: suwayomi-server-1
    targetRevision: HEAD
  destination:
    server: https://kubernetes.default.svc
  ignoreDifferences:
    - group: ""
      kind: PersistentVolumeClaim
      jsonPointers:
        - /spec/volumeName
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      enabled: true
    syncOptions:
      - CreateNamespace=true
      - Replace=true
