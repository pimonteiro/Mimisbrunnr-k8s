apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: suwayomi-server-1-downloads-mig-pvc
  namespace: suwayomi-server-1
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: truenas-nfs
  resources:
    requests:
      storage: 10Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: suwayomi-server-1-data-mig-pvc
  namespace: suwayomi-server-1
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: truenas-nfs
  resources:
    requests:
      storage: 2Gi