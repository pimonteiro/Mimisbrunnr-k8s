apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: glance-1
  namespace: glance-1
spec:
  entryPoints:
    - websecure
  routes:
    - kind: Rule
      match: Host(`glance.pimonlab.xyz`)
      priority: 10
      services:
        - name: glance-1
          namespace: glance-1
          port: 80
  tls:
    secretName: glance-1-ts-secret
