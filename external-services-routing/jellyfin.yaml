apiVersion: v1
kind: Service
metadata:
  name: jellyfin-svc
  namespace: external-services
spec:
  ports:
    - name: web
      port: 8096
      targetPort: 8096
  selector:
    app: jellyfin-proxy
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: jellyfin-proxy
  namespace: external-services
spec:
  replicas: 1
  selector:
    matchLabels:
      app: jellyfin-proxy
  template:
    metadata:
      labels:
        app: jellyfin-proxy
    spec:
      containers:
      - name: socat
        image: alpine/socat
        args: ["TCP-LISTEN:8096,fork", "TCP:192.168.7.45:8096"]
        resources:
          requests:
            cpu: "10m"
            memory: "25Mi"
          limits:
            memory: "50Mi"
        ports:
        - containerPort: 8096
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: jellyfin-tls-cert
  namespace: external-services
spec:
  secretName: jellyfin-ts-secret
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
  commonName: "jellyfin.pimonlab.xyz"
  dnsNames:
  - "jellyfin.pimonlab.xyz"
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: jellyfin-ingress
  namespace: external-services
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`jellyfin.pimonlab.xyz`)
      kind: Rule
      services:
        - name: jellyfin-svc
          port: 8096
  tls:
    secretName: jellyfin-ts-secret
