apiVersion: v1
kind: Service
metadata:
  name: trip-svc
  namespace: external-services
spec:
  ports:
    - name: web
      port: 8010
      targetPort: 8010
  selector:
    app: trip-proxy
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: trip-proxy
  namespace: external-services
spec:
  replicas: 1
  selector:
    matchLabels:
      app: trip-proxy
  template:
    metadata:
      labels:
        app: trip-proxy
    spec:
      containers:
      - name: socat
        image: alpine/socat
        args: ["TCP-LISTEN:8010,fork", "TCP:192.168.7.40:8010"]
        resources:
          requests:
            cpu: "10m"
            memory: "25Mi"
          limits:
            memory: "50Mi"
        ports:
        - containerPort: 8010
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: trip-tls-cert
  namespace: external-services
spec:
  secretName: trip-ts-secret
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
  commonName: "trip.pimonlab.xyz"
  dnsNames:
  - "trip.pimonlab.xyz"
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: trip-ingress
  namespace: external-services
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`trip.pimonlab.xyz`)
      kind: Rule
      services:
        - name: trip-svc
          port: 8010
  tls:
    secretName: trip-ts-secret
