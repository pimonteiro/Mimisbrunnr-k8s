apiVersion: v1
kind: Service
metadata:
  name: sonarr-svc
  namespace: external-services
spec:
  ports:
    - name: web
      port: 8989
      targetPort: 8989
  selector:
    app: sonarr-proxy
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sonarr-proxy
  namespace: external-services
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sonarr-proxy
  template:
    metadata:
      labels:
        app: sonarr-proxy
    spec:
      containers:
      - name: socat
        image: alpine/socat
        args: ["TCP-LISTEN:8989,fork", "TCP:192.168.7.40:8989"]
        resources:
          requests:
            cpu: "10m"
            memory: "25Mi"
          limits:
            memory: "50Mi"
        ports:
        - containerPort: 8989
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: sonarr-tls-cert
  namespace: external-services
spec:
  secretName: sonarr-ts-secret
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
  commonName: "sonarr.pimonlab.xyz"
  dnsNames:
  - "sonarr.pimonlab.xyz"
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: sonarr-ingress
  namespace: external-services
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`sonarr.pimonlab.xyz`)
      kind: Rule
      services:
        - name: sonarr-svc
          port: 8989
  tls:
    secretName: sonarr-ts-secret
