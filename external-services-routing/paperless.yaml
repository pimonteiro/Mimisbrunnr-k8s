apiVersion: v1
kind: Service
metadata:
  name: paperless-svc
  namespace: external-services
spec:
  ports:
    - name: web
      port: 8000
      targetPort: 8000
  selector:
    app: paperless-proxy
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: paperless-proxy
  namespace: external-services
spec:
  replicas: 1
  selector:
    matchLabels:
      app: paperless-proxy
  template:
    metadata:
      labels:
        app: paperless-proxy
    spec:
      containers:
      - name: socat
        image: alpine/socat
        args: ["TCP-LISTEN:8000,fork", "TCP:192.168.7.40:8000"]
        resources:
          requests:
            cpu: "10m"
            memory: "25Mi"
          limits:
            memory: "50Mi"
        ports:
        - containerPort: 8000
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: paperless-tls-cert
  namespace: external-services
spec:
  secretName: paperless-ts-secret
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
  commonName: "paperless.pimonlab.xyz"
  dnsNames:
  - "paperless.pimonlab.xyz"
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: paperless-ingress
  namespace: external-services
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`paperless.pimonlab.xyz`)
      kind: Rule
      services:
        - name: paperless-svc
          port: 8000
  tls:
    secretName: paperless-ts-secret
