apiVersion: v1
kind: Service
metadata:
  name: prowlarr-private-svc
  namespace: external-services
spec:
  ports:
    - name: web
      port: 9697
      targetPort: 9697
  selector:
    app: prowlarr-private-proxy
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prowlarr-private-proxy
  namespace: external-services
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prowlarr-private-proxy
  template:
    metadata:
      labels:
        app: prowlarr-private-proxy
    spec:
      containers:
      - name: socat
        image: alpine/socat
        args: ["TCP-LISTEN:9697,fork", "TCP:192.168.3.2:9697"]
        resources:
          requests:
            cpu: "10m"
            memory: "25Mi"
          limits:
            memory: "50Mi"
        ports:
        - containerPort: 9697
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: prowlarr-private-tls-cert
  namespace: external-services
spec:
  secretName: prowlarr-private-ts-secret
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
  commonName: "prowlarr-2.pimonlab.xyz"
  dnsNames:
  - "prowlarr-2.pimonlab.xyz"
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: prowlarr-private-ingress
  namespace: external-services
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`prowlarr-2.pimonlab.xyz`)
      kind: Rule
      services:
        - name: prowlarr-private-svc
          port: 9697
  tls:
    secretName: prowlarr-private-ts-secret
