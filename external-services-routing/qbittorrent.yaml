apiVersion: v1
kind: Service
metadata:
  name: qbittorrent-svc
  namespace: external-services
spec:
  ports:
    - name: web
      port: 7423
      targetPort: 7423
  selector:
    app: qbittorrent-proxy
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: qbittorrent-proxy
  namespace: external-services
spec:
  replicas: 1
  selector:
    matchLabels:
      app: qbittorrent-proxy
  template:
    metadata:
      labels:
        app: qbittorrent-proxy
    spec:
      containers:
      - name: socat
        image: alpine/socat
        args: ["TCP-LISTEN:7423,fork", "TCP:192.168.3.2:7423"]
        resources:
          requests:
            cpu: "10m"
            memory: "25Mi"
          limits:
            memory: "50Mi"
        ports:
        - containerPort: 7423
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: qbittorrent-tls-cert
  namespace: external-services
spec:
  secretName: qbittorrent-ts-secret
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
  commonName: "qbit.pimonlab.xyz"
  dnsNames:
  - "qbit.pimonlab.xyz"
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: qbittorrent-ingress
  namespace: external-services
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`qbit.pimonlab.xyz`)
      kind: Rule
      services:
        - name: qbittorrent-svc
          port: 7423
  tls:
    secretName: qbittorrent-ts-secret
