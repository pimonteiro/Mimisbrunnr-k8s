apiVersion: v1
kind: Service
metadata:
  name: audiobookshelf-svc
  namespace: external-services
spec:
  ports:
    - name: web
      port: 13378
      targetPort: 13378
---
apiVersion: discovery.k8s.io/v1
kind: EndpointSlice
metadata:
  name: audiobookshelf-slice
  namespace: external-services
  labels:
    # This label is the MAGqIC GLUE that links this slice to the Service above
    kubernetes.io/service-name: audiobookshelf-svc
addressType: IPv4
ports:
  - name: web # Must match the Service port name
    port: 13378
    protocol: TCP
endpoints:
  - addresses:
      - "192.168.3.2" # Your external IP
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: audiobookshelf-tls-cert
  namespace: external-services
spec:
  secretName: audiobookshelf-ts-secret
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
  commonName: "audiobookshelf.pimonlab.xyz"
  dnsNames:
  - "audiobookshelf.pimonlab.xyz"
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: audiobookshelf-ingress
  namespace: external-services
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`audiobookshelf.pimonlab.xyz`)
      kind: Rule
      services:
        - name: audiobookshelf-svc
          port: 13378
  tls:
    secretName: audiobookshelf-ts-secret