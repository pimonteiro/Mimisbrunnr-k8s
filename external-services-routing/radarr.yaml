apiVersion: v1
kind: Service
metadata:
  name: radarr-svc
  namespace: external-services
spec:
  ports:
    - name: web
      port: 7878
      targetPort: 7878
  selector:
    app: radarr-proxy
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: radarr-proxy
  namespace: external-services
spec:
  replicas: 1
  selector:
    matchLabels:
      app: radarr-proxy
  template:
    metadata:
      labels:
        app: radarr-proxy
    spec:
      containers:
      - name: socat
        image: alpine/socat
        args: ["TCP-LISTEN:7878,fork", "TCP:192.168.3.2:7878"]
        resources:
          requests:
            cpu: "10m"
            memory: "25Mi"
          limits:
            memory: "50Mi"
        ports:
        - containerPort: 7878
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: radarr-tls-cert
  namespace: external-services
spec:
  secretName: radarr-ts-secret
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
  commonName: "radarr.pimonlab.xyz"
  dnsNames:
  - "radarr.pimonlab.xyz"
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: radarr-ingress
  namespace: external-services
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`radarr.pimonlab.xyz`)
      kind: Rule
      services:
        - name: radarr-svc
          port: 7878
  tls:
    secretName: radarr-ts-secret
